<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas de Concursos Jurídicos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }
        header p {
            font-size: 0.85rem;
            opacity: 0.75;
        }
        .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-top: 0.8rem;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.2rem 1.3rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-left: 4px solid #e94560;
        }
        .tag {
            display: inline-block;
            background: #f0f2f5;
            color: #555;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            letter-spacing: 0.3px;
            margin-bottom: 0.6rem;
        }
        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }
        .card h2 a {
            color: inherit;
            text-decoration: none;
        }
        .card h2 a:hover {
            color: #e94560;
        }
        .motivo {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 0.9rem;
        }
        .btn {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            text-decoration: none;
        }
        .btn:hover {
            background: #e94560;
        }
        .vazio {
            text-align: center;
            color: #888;
            padding: 3rem 1rem;
            font-size: 0.95rem;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.78rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚖️ Alertas de Concursos Jurídicos</h1>
        <p>Verificação de 25/04/2026 às 12h30 · 0 links analisados</p>
        <div class="badge">0 oportunidade(s) relevante(s)</div>
    </header>
    <div class="container">
        <div class="vazio">Nenhuma oportunidade relevante encontrada nesta verificação.</div>
    </div>
    <footer>Gerado automaticamente · Alertas de Concursos Jurídicos</footer>
</body>
</html>
